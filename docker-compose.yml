version: "3.9"

services:

  # ------------------------------------------------------------------
  # MongoDB — persistent store for shipments, accounts, and GridFS files
  # ------------------------------------------------------------------
  mongodb:
    pull_policy: never
    build:
      context: ./docker
      dockerfile: Dockerfile.mongo
    image: xpmile-mongo:latest
    container_name: xpmile-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"   # remove this line if you don't need direct host access
    networks:
      - xpmile-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ------------------------------------------------------------------
  # xpmile application (C++ backend + Angular UI served together)
  # ------------------------------------------------------------------
  app:
    pull_policy: never
    build:
      context: .                    # repo root — Dockerfile COPYs backend/ and ui/
      dockerfile: docker/Dockerfile
    image: xpmile:latest
    container_name: xpmile-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy  # wait until MongoDB is accepting connections
    environment:
      PORT: "${PORT:-8080}"
      ARGS: >-
        --server-worker ${SERVER_WORKERS:-5}
        --mongo-db-name ${MONGO_DB:-xpmile}
        --mongo-db-connection-pool ${MONGO_POOL:-20}
        --mongo-db-uri mongodb://mongodb:27017/${MONGO_DB:-xpmile}?maxPoolSize=${MONGO_POOL:-20}
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    networks:
      - xpmile-net

# ------------------------------------------------------------------
# Named volume for MongoDB data (survives container restarts)
# ------------------------------------------------------------------
volumes:
  mongo-data:

# ------------------------------------------------------------------
# Isolated bridge network — services talk by name (mongodb, app)
# ------------------------------------------------------------------
networks:
  xpmile-net:
    driver: bridge
