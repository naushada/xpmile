<form clrForm clrLayout="compact" clrLabelSize="3" [formGroup]="singleShipmentForm">

  <!-- AWB row -->
  <div class="clr-row awb-row">
    <div class="clr-col-auto">
      <clr-checkbox-container>
        <clr-checkbox-wrapper>
          <input type="checkbox" formControlName="isAutoGenerate" clrToggle (change)="onAutoGenerate($event)"/>
          <label>Autogenerate AWB No.</label>
        </clr-checkbox-wrapper>
      </clr-checkbox-container>
    </div>
    <div class="clr-col-4">
      <clr-input-container>
        <label>AWB No.</label>
        <input clrInput name="awbno" formControlName="awbno" (clrDisable)="isAwbNoDisabled" />
      </clr-input-container>
    </div>
    <div class="clr-col-4">
      <clr-input-container>
        <label>Alt. Ref. No.</label>
        <input clrInput name="altRefNo" formControlName="altRefNo" />
      </clr-input-container>
    </div>
  </div>

  <!-- Three-column form body -->
  <div class="clr-row form-body">

    <!-- Sender Information -->
    <div class="clr-col-4">
      <p class="section-head"><u><i>Sender Information</i></u></p>
      <div formGroupName="senderInformation">

        <clr-input-container *ngIf="'Customer' == this.loggedInUser?.personalInfo?.role">
          <label>Account No.</label>
          <input clrInput name="accountNo" formControlName="accountNo" />
        </clr-input-container>
        <div class="acct-row" *ngIf="'Customer' != this.loggedInUser?.personalInfo?.role">
          <clr-select-container>
            <label>Account No.</label>
            <select clrSelect name="accountNo" formControlName="accountNo">
              <option *ngFor="let act of this.accountInfoList" [value]="act.loginCredentials.accountCode">
                {{act.loginCredentials.accountCode}}
              </option>
            </select>
          </clr-select-container>
          <button class="btn btn-sm acct-btn" (click)="retrieveAccountInfo()">Retrieve</button>
        </div>

        <clr-input-container>
          <label>Reference No.</label>
          <input clrInput name="referenceNo" formControlName="referenceNo" />
        </clr-input-container>
        <clr-input-container>
          <label>Name</label>
          <input clrInput name="name" formControlName="name" />
        </clr-input-container>
        <clr-input-container>
          <label>Company</label>
          <input clrInput name="companyName" formControlName="companyName" />
        </clr-input-container>
        <clr-select-container>
          <label>Country</label>
          <select clrSelect name="country" formControlName="country">
            <option *ngFor="let cuntry of this.defValue?.CountryName" [value]="cuntry">{{cuntry}}</option>
          </select>
        </clr-select-container>
        <clr-input-container>
          <label>City</label>
          <input clrInput name="city" formControlName="city" />
        </clr-input-container>
        <clr-input-container>
          <label>State</label>
          <input clrInput name="state" formControlName="state" />
        </clr-input-container>
        <clr-input-container>
          <label>Address</label>
          <input clrInput name="address" formControlName="address" />
        </clr-input-container>
        <clr-input-container>
          <label>Postal Code</label>
          <input clrInput name="postalCode" formControlName="postalCode" />
        </clr-input-container>
        <clr-input-container>
          <label>Contact</label>
          <input clrInput name="contact" formControlName="contact" />
        </clr-input-container>
        <clr-input-container>
          <label>Phone</label>
          <input clrInput name="phoneNumber" formControlName="phoneNumber" />
        </clr-input-container>
        <clr-input-container>
          <label>E-Mail</label>
          <input clrInput name="email" formControlName="email" />
        </clr-input-container>
        <clr-input-container>
          <label>Tax ID</label>
          <input clrInput name="receivingTaxId" formControlName="receivingTaxId" />
        </clr-input-container>
      </div>
    </div>

    <!-- Shipment Information -->
    <div class="clr-col-4" formGroupName="shipmentInformation">
      <p class="section-head"><u><i>Shipment Information</i></u></p>

      <clr-input-container>
        <label>SKU No.</label>
        <input clrInput name="skuNo" formControlName="skuNo" />
      </clr-input-container>
      <clr-select-container>
        <label>Service</label>
        <select clrSelect name="service" formControlName="service">
          <option *ngFor="let svc of this.defValue?.ServiceType" [value]="svc">{{svc}}</option>
        </select>
      </clr-select-container>
      <clr-input-container>
        <label>No. of Items</label>
        <input clrInput name="numberOfItems" class="mandatory" formControlName="numberOfItems" />
      </clr-input-container>
      <clr-input-container>
        <label>Goods Desc.</label>
        <input clrInput name="goodsDescription" formControlName="goodsDescription" />
      </clr-input-container>
      <clr-input-container>
        <label>Goods Value</label>
        <input clrInput name="goodsValue" formControlName="goodsValue" />
      </clr-input-container>
      <clr-input-container>
        <label>Customs Value</label>
        <input clrInput name="customsValue" formControlName="customsValue" />
      </clr-input-container>
      <clr-input-container>
        <label>COD Amount</label>
        <input clrInput name="codAmount" formControlName="codAmount" />
      </clr-input-container>
      <clr-input-container>
        <label>VAT</label>
        <input clrInput name="vat" formControlName="vat" />
      </clr-input-container>
      <clr-select-container>
        <label>Currency</label>
        <select clrSelect name="currency" formControlName="currency">
          <option *ngFor="let currency of this.defValue?.Currency" [value]="currency">{{currency}}</option>
        </select>
      </clr-select-container>
      <clr-input-container>
        <label>Weight</label>
        <input clrInput name="weight" formControlName="weight" />
      </clr-input-container>
      <clr-select-container>
        <label>Weight Units</label>
        <select clrSelect name="weightUnits" formControlName="weightUnits">
          <option value="kg">KG</option>
          <option value="gram">Gram</option>
        </select>
      </clr-select-container>
      <clr-input-container>
        <label>Cubic (LxBxH)</label>
        <input clrInput name="cubicWeight" formControlName="cubicWeight" />
      </clr-input-container>
    </div>

    <!-- Receiver Information -->
    <div class="clr-col-4" formGroupName="receiverInformation">
      <p class="section-head"><u><i>Receiver Information</i></u></p>

      <clr-input-container>
        <label>Name</label>
        <input clrInput name="name" formControlName="name" />
      </clr-input-container>
      <clr-select-container>
        <label>Country</label>
        <select clrSelect name="country" formControlName="country">
          <option *ngFor="let cuntry of this.defValue?.CountryName" [value]="cuntry">{{cuntry}}</option>
        </select>
      </clr-select-container>
      <clr-input-container>
        <label>City</label>
        <input clrInput name="city" formControlName="city" />
      </clr-input-container>
      <clr-input-container>
        <label>State</label>
        <input clrInput name="state" formControlName="state" />
      </clr-input-container>
      <clr-input-container>
        <label>Postal Code</label>
        <input clrInput name="postalCode" formControlName="postalCode" />
      </clr-input-container>
      <clr-input-container>
        <label>Contact</label>
        <input clrInput name="contact" formControlName="contact" />
      </clr-input-container>
      <clr-input-container>
        <label>Address</label>
        <input clrInput name="address" formControlName="address" />
      </clr-input-container>
      <clr-input-container>
        <label>Phone</label>
        <input clrInput name="phone" formControlName="phone" />
      </clr-input-container>
      <clr-input-container>
        <label>E-Mail</label>
        <input clrInput name="email" formControlName="email" />
      </clr-input-container>
    </div>

  </div>

  <!-- Create button -->
  <div class="clr-row">
    <div class="clr-col">
      <button class="btn btn-primary" (click)="onShipmentCreate()">Create Shipment</button>
    </div>
  </div>

</form>
