<form [formGroup]="emailForm">

  <div class="compose-card">

    <div class="compose-field">
      <label>To</label>
      <input type="text" formControlName="to" placeholder="Separate multiple addresses with a comma" />
    </div>

    <div class="compose-field">
      <label>Cc</label>
      <input type="text" formControlName="cc" placeholder="Separate multiple addresses with a comma" />
    </div>

    <div class="compose-field">
      <label>Bcc</label>
      <input type="text" formControlName="bcc" placeholder="Separate multiple addresses with a comma" />
    </div>

    <div class="compose-field">
      <label>Subject</label>
      <input type="text" formControlName="subject" />
    </div>

    <div class="compose-body">
      <textarea formControlName="emailbody" rows="14" placeholder="Message"></textarea>
    </div>

    <div class="compose-attachments">
      <label>Attachments</label>
      <input type="file" multiple (change)="onFilesSelected($event)" />
      <span *ngIf="attachedFiles.length > 0">{{ attachedFiles.length }} file(s) selected</span>
    </div>

  </div>

  <button type="button" class="btn btn-primary" style="margin-top: 12px;" (click)="sendEmail()">Send Email</button>

</form>
